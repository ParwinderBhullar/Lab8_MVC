services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: student-workshop-sqlserver

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "YourStrongPassword123!"

    ports:
      - "1433:1433"

    volumes:
      - sqlserver-data:/var/opt/mssql

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  student-workshop-portal:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: student-workshop-portal

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__StudentWorkshopDb: >
        Server=sqlserver;
        Database=StudentWorkshopDb;
        User Id=sa;
        Password=YourStrongPassword123!;
        TrustServerCertificate=True;
        Encrypt=False;

    volumes:
      - ./Data:/app/Data

    depends_on:
      sqlserver:
        condition: service_healthy

    restart: unless-stopped

volumes:
  sqlserver-data: